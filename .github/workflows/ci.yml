name: CI - Model Training

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          RUN_ID=$(ls -td mlruns/0/*/ | head -1 | xargs basename)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=file:./MLProject/mlruns" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Upload to GitHub
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add MLProject/mlruns -f
          git diff --staged --quiet || git commit -m "CI: save mlflow artifact run ${{ env.RUN_ID }}"
          git pull --rebase origin main || true
          git push

      - name: Build Docker Model
        run: |
          mlflow models generate-dockerfile -m runs:/${{ env.RUN_ID }}/model -d docker_build_dir --enable-mlserver
          sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' docker_build_dir/Dockerfile
          docker build -t breast-cancer-model docker_build_dir

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: docker tag breast-cancer-model ${{ secrets.DOCKER_HUB_USERNAME }}/breast-cancer-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/breast-cancer-model:latest
